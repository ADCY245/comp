{% extends 'admin_base.html' %}
{% block title %}Admin Dashboard{% endblock %}

{% block admin_content %}
<h2 class="mb-4">Admin Dashboard</h2>
<div class="row">
  <div class="col-md-6 mb-4">
    <canvas id="usersChart"></canvas>
  </div>
  <div class="col-md-6 mb-4">
    <canvas id="quotationChart"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctxUsers = document.getElementById('usersChart');
  const ctxQuotes = document.getElementById('quotationChart');
  // Dummy data, replace via API later
  const usersChart = new Chart(ctxUsers, {type:'bar', data:{labels:['Mon','Tue','Wed','Thu','Fri'], datasets:[{label:'Logins', data:[3,5,2,8,4], backgroundColor:'#007bff'}]}, options:{responsive:true}});
  const quotesChart = new Chart(ctxQuotes, {type:'line', data:{labels:['Mon','Tue','Wed','Thu','Fri'], datasets:[{label:'Quotations', data:[1,4,0,2,5], borderColor:'#28a745', fill:false}]}, options:{responsive:true}});
</script>
{% endblock %}
