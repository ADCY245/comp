{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-template">
                <h1 class="display-1">500</h1>
                <h2 class="display-4">Internal Server Error</h2>
                <div class="error-details mb-4">
                    Oops! Something went wrong on our end. We're working to fix it.
                </div>
                <div class="error-actions">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg me-2">
                        <i class="bi bi-house-door"></i> Take Me Home
                    </a>
                    <a href="{{ url_for('main.contact') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-bug"></i> Report Issue
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
