{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-template">
                <h1 class="display-1">403</h1>
                <h2 class="display-4">Access Forbidden</h2>
                <div class="error-details mb-4">
                    Sorry, you don't have permission to access this page.
                </div>
                <div class="error-actions">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg me-2">
                        <i class="bi bi-house-door"></i> Take Me Home
                    </a>
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
