{% if current_user.is_authenticated and current_user is defined and current_user.role is defined and current_user.role|lower == 'dealer' %}
    {% extends 'dealer/base.html' %}
    <style>
        .company-info-card {
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--bs-primary);
        }
        .navbar {
            background-color: var(--bs-info) !important;
        }
    </style>
{% else %}
    {% extends 'user/base.html' %}
    <style>
        .company-info-card {
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--bs-primary);
        }
        .navbar {
            background-color: var(--bs-info) !important;
        }
    </style>
{% endif %}
