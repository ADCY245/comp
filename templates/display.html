{% extends "base.html" %}

{% block title %}Welcome - WQA{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title">Welcome to WQA</h4>
                </div>
                <div class="card-body">
                    <p>Welcome {{ current_user.email }}!</p>
                    <p>You are currently logged in and can proceed with the product selection process.</p>
                    <div class="d-flex justify-content-end mt-3">
                        <a href="{{ url_for('company_selection') }}" class="btn btn-primary">
                            <i class="bi bi-arrow-right-circle me-1"></i> Continue to Company Selection
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
