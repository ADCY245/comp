{% extends "dealer/base.html" %}

{% block title %}Add New Machine{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Add New Machine</h4>
                </div>
                <div class="card-body">
                    <form id="addMachineForm">
                        <div class="mb-3">
                            <label for="machineName" class="form-label">Machine Name *</label>
                            <input type="text" class="form-control" id="machineName" required>
                            <div class="invalid-feedback">
                                Please provide a machine name.
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger" id="submitBtn">
                                <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status" aria-hidden="true"></span>
                                Add Machine
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Response Message -->
            <div id="responseMessage" class="mt-3 d-none">
                <div class="alert" role="alert">
                    <p id="messageText"></p>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('addMachineForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const responseDiv = document.getElementById('responseMessage');
    const messageText = document.getElementById('messageText');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            return;
        }

        const machineData = {
            name: document.getElementById('machineName').value.trim()
        };

        try {
            // Show loading state
            submitBtn.disabled = true;
            spinner.classList.remove('d-none');
            
            const response = await fetch('/api/dealer/machines', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(machineData)
            });

            const data = await response.json();
            
            // Show response message
            responseDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
            
            if (response.ok) {
                responseDiv.classList.add('alert-success');
                messageText.textContent = 'Machine added successfully!';
                form.reset();
                form.classList.remove('was-validated');
                
                // Redirect to machines list after a short delay
                setTimeout(() => {
                    window.location.href = '{{ url_for("dealer_machines") }}';
                }, 1500);
            } else {
                responseDiv.classList.add('alert-danger');
                messageText.textContent = data.message || 'Failed to add machine. Please try again.';
            }
        } catch (error) {
            console.error('Error:', error);
            responseDiv.classList.remove('d-none', 'alert-success');
            responseDiv.classList.add('alert-danger');
            messageText.textContent = 'An error occurred. Please try again.';
        } finally {
            // Reset loading state
            submitBtn.disabled = false;
            spinner.classList.add('d-none');
        }
    });
});
</script>
{% endblock %}
{% endblock %}
